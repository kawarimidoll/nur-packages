name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.system }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            system: x86_64-linux
          - os: macos-latest
            system: aarch64-darwin
    permissions:
      contents: read # checkout repository
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@2126ae7fc54c9df00dd18f7f18754393182c73cd # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1 # v16
        with:
          name: kawarimidoll
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - name: Show nixpkgs version
        run: nix eval --raw 'nixpkgs#lib.version'
      - name: Build all packages
        env:
          NIX_SYSTEM: ${{ matrix.system }}
        run: |
          for pkg in $(nix flake show --json | jq -r ".packages.\"${NIX_SYSTEM}\" | keys[]"); do
            # Check if package supports this platform
            platforms=$(nix eval --json ".#$pkg.meta.platforms" 2>/dev/null || echo '[]')
            if echo "$platforms" | jq -e "index(\"${NIX_SYSTEM}\")" > /dev/null 2>&1; then
              echo "::group::Building $pkg"
              nix build ".#$pkg" --print-build-logs
              echo "::endgroup::"
            else
              echo "::notice::Skipping $pkg (not supported on ${NIX_SYSTEM})"
            fi
          done
